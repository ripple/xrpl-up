name: Test

on:
  push:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (defaults to triggering commit)'
        required: false
        type: string
      upload-dist:
        description: 'Upload the dist/ artifact after a successful build'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: e2e (node-${{ matrix.node-version }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        mode: [standalone, local-network, snapshot, testnet]
        include:
          - mode: standalone
            test-script: test:e2e:local
          - mode: local-network
            test-script: test:e2e:local-network
          - mode: snapshot
            test-script: test:e2e:snapshot
          - mode: testnet
            test-script: test:e2e
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Pull rippled Docker image
        run: docker pull xrpllabsofficial/xrpld:latest
      - name: Run e2e tests (${{ matrix.mode }})
        env:
          XRPL_LOCAL_TEARDOWN: '1'
        run: npm run ${{ matrix.test-script }}
      - name: Upload dist artifact
        # Only upload from the canonical Node version used by the release job.
        # Uploading from all matrix legs would create duplicate artifacts.
        if: ${{ inputs.upload-dist && matrix.node-version == 22 && matrix.mode == 'standalone' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

