name: Test

on:
  push:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (defaults to triggering commit)'
        required: false
        type: string
      upload-dist:
        description: 'Upload the dist/ artifact after a successful build'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: e2e (node-${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run e2e tests against local docker node
        env:
          XRPL_LOCAL_TEARDOWN: '1'
        run: npm run test:e2e:local
      - name: Upload dist artifact
        # Only upload from the canonical Node version used by the release job.
        # Uploading from all matrix legs would create duplicate artifacts.
        if: ${{ inputs.upload-dist && matrix.node-version == 22 }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
