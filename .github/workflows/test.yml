name: Test

on:
  push:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (defaults to triggering commit)'
        required: false
        type: string
      upload-dist:
        description: 'Upload the dist/ artifact after a successful build'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run e2e tests against local docker node
        env:
          XRPL_LOCAL_TEARDOWN: '1'
        run: npm run test:e2e:local
      - name: Upload dist artifact
        if: ${{ inputs.upload-dist }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
